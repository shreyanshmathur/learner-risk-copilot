[build]
  command   = "cd client && npm install && npm run build"
  publish   = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Redirect /api/* → Netlify Functions so frontend code is unchanged
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
